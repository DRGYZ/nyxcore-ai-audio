profile: "default"

profiles:
  default: {}
  collector:
    health:
      low_bitrate_threshold_bps: 160000
      sample_limit: 8
    duplicates:
      prefer_richer_metadata: true
      prefer_cover_art: true
    review:
      sample_limit: 8
      missing_metadata_base_score: 60.0
      artwork_missing_base_score: 40.0
    playlist:
      default_min_score: 0.2
  dj:
    health:
      short_duration_seconds: 45
      long_duration_seconds: 720
    duplicates:
      prefer_higher_bitrate: true
      prefer_larger_file: true
    review:
      likely_duplicate_base_score: 56.0
      low_quality_base_score: 34.0
    playlist:
      bpm_match_weight: 2.6
      energy_match_weight: 2.2
      default_min_score: 1.0
  casual:
    health:
      sample_limit: 3
    duplicates:
      likely_duplicate_threshold: 0.82
    review:
      sample_limit: 3
      medium_priority_score: 50.0
    playlist:
      default_max_tracks: 15
      default_min_score: -0.5
      keyword_match_weight: 0.8
  archivist:
    health:
      low_bitrate_threshold_bps: 192000
      long_filename_threshold: 100
      sample_limit: 10
    duplicates:
      likely_duplicate_threshold: 0.74
      prefer_lossless_formats: true
      prefer_richer_metadata: true
      prefer_cover_art: true
    review:
      sample_limit: 8
      low_quality_base_score: 52.0
      missing_metadata_base_score: 62.0
      folder_hotspot_base_score: 44.0
    playlist:
      default_min_score: 0.3
    watch:
      default_interval_seconds: 5.0

judge:
  prompt_version: "judge_v1_heuristics"
  prompts:
    system: |
      You are a strict music mood/genre judge.
      Return STRICT JSON with keys: tags, genre_top, tag_agreement, genre_decision, reason.
      Optional debug key: conflicts (0,1,2).
      tags must be 2-3 items max, unique, subset of allowed moods.
      genre_top must be null or subset of allowed genres.
      tag_agreement must be one of: low, medium, high.
      genre_decision must be one of: keep, drop.
      Do not output numeric confidence.
      reason must be <=120 chars.
      Never invent artist/title. Use only supplied evidence.
    user_rules:
      - "use hybrid evidence (bpm/energy + clap tags/genre + filename path)"
      - "if genre ambiguous, set genre_top=null"
      - "2-3 tags max, no duplicates"
      - "keep consistent with vocab"
      - "use phrase 'BPM atypical for genre' instead of strong mismatch claims"
      - "set tag_agreement based on filename/title cues + hybrid tag consistency"
      - "set genre_decision=keep only when genre evidence is coherent"
  moods:
    - "dark"
    - "hypnotic"
    - "night-drive"
    - "chill"
    - "energetic"
    - "aggressive"
    - "sad"
    - "uplifting"
    - "cinematic"
    - "melancholic"
    - "tense"
    - "mysterious"
    - "epic"
    - "relaxed"
  genres:
    - "hip hop"
    - "trap"
    - "phonk"
    - "drill"
    - "electronic"
    - "techno"
    - "house"
    - "drum and bass"
    - "dubstep"
    - "ambient"
    - "classical"
    - "rock"
    - "metal"
    - "pop"
    - "r&b"
    - "lofi"
    - "soundtrack"
    - "jazz"
    - "reggaeton"
  genre_aliases:
    "drum & bass": "drum and bass"
    "dnb": "drum and bass"
    "hiphop": "hip hop"
  filename_hints:
    "ost": "soundtrack"
    "soundtrack": "soundtrack"
    "theme": "soundtrack"
    "2pac": "hip hop"
  bpm_bands:
    "drum and bass":
      typical:
        - [160, 180]
      tolerant:
        - [150, 190]
    "dubstep":
      typical:
        - [135, 150]
      tolerant:
        - [130, 155]
        - [65, 77]
    "hip hop":
      typical:
        - [70, 105]
      tolerant:
        - [60, 115]
        - [140, 170]
  reason:
    max_chars: 120
  concurrency_default: 10

health:
  sample_limit: 5
  low_bitrate_threshold_bps: 128000
  short_duration_seconds: 30
  long_duration_seconds: 900
  long_filename_threshold: 120
  placeholder_values:
    - "unknown"
    - "untitled"
    - "track"
    - "audio"
    - "song"
  placeholder_track_pattern: "^track\\s*0*\\d+$"

duplicates:
  likely_duplicate_threshold: 0.78
  duration_close_seconds: 1.5
  duration_near_seconds: 3.0
  title_strong_similarity: 0.96
  title_good_similarity: 0.90
  artist_strong_similarity: 0.96
  artist_good_similarity: 0.90
  stem_good_similarity: 0.92
  prefer_lossless_formats: true
  prefer_higher_bitrate: true
  prefer_richer_metadata: true
  prefer_cover_art: true
  prefer_larger_file: true

playlist:
  default_max_tracks: 25
  default_min_score: 0.0
  mood_match_weight: 2.0
  genre_match_weight: 2.2
  cultural_match_weight: 1.6
  bpm_match_weight: 2.0
  energy_match_weight: 1.8
  keyword_match_weight: 0.6
  instrumental_hint_weight: 1.8
  vocal_penalty_weight: 1.8
  negative_keyword_penalty: 1.6
  cover_art_bonus: 0.1
  duration_cap_bonus: 1.2
  duration_floor_bonus: 1.0
  max_reason_count: 4
  bpm_window_around: 5.0

watch:
  default_interval_seconds: 2.0

review:
  sample_limit: 5
  high_priority_score: 75.0
  medium_priority_score: 45.0
  exact_duplicate_base_score: 68.0
  likely_duplicate_base_score: 52.0
  missing_metadata_base_score: 56.0
  weak_metadata_base_score: 42.0
  artwork_missing_base_score: 34.0
  low_quality_base_score: 40.0
  folder_hotspot_base_score: 38.0
  reclaimable_bytes_unit: 50000000
  files_affected_weight: 3.0
  folder_issue_weight: 2.0
  missing_artist_weight: 4.0
  missing_title_weight: 3.0
  missing_album_weight: 2.0
  unreadable_weight: 6.0
  low_bitrate_weight: 3.0
  artwork_gap_weight: 0.2
  likely_confidence_weight: 20.0
